services:
  - type: web
    name: darshan-lovely-events-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: darshan_lovely_events
      - key: CORS_ORIGINS
        sync: false
